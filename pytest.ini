[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
addopts = -v --maxfail=3 --alluredir=test-results/allure-results --output=test-results/playwright
markers =
    user_setup: smoke user setup chain; failed setup skips all smoke groups
    smoke_group(name): independent smoke group; failure skips only the same group
