name: Daily Smoke Tests

on:
  schedule:
    - cron: "15 9 * * *"
      timezone: "Asia/Tashkent"
  workflow_dispatch:
    inputs:
      scope:
        description: Test scope
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - regression
      server_url:
        description: Server URL
        required: true
        default: https://smartup.online/
        type: string
      target:
        description: Test target
        required: true
        default: all
        type: choice
        options:
          - all
          - setup
          - group-a
          - group-b

concurrency:
  group: daily-smoke-tests
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TEST_SCOPE: ${{ github.event.inputs.scope || 'smoke' }}
      TEST_SERVER_URL: ${{ github.event.inputs.server_url || 'https://smartup.online/' }}
      TEST_TARGET: ${{ github.event.inputs.target || 'all' }}
      SMARTUP_COMPANY_CODE: ${{ secrets.SMARTUP_COMPANY_CODE }}
      SMARTUP_COMPANY_PASSWORD: ${{ secrets.SMARTUP_COMPANY_PASSWORD }}
      APP3_COMPANY_CODE: ${{ secrets.APP3_COMPANY_CODE }}
      APP3_COMPANY_PASSWORD: ${{ secrets.APP3_COMPANY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Select and mask company credentials
        run: |
          NORMALIZED_TEST_SERVER_URL="${TEST_SERVER_URL%/}"
          echo "TEST_SERVER_URL=$NORMALIZED_TEST_SERVER_URL" >> "$GITHUB_ENV"
          if [ "$NORMALIZED_TEST_SERVER_URL" = "https://app3.greenwhite.uz/xtrade" ]; then
            SELECTED_COMPANY_SOURCE="APP3 secrets"
            SELECTED_COMPANY_CODE="$APP3_COMPANY_CODE"
            SELECTED_COMPANY_PASSWORD="$APP3_COMPANY_PASSWORD"
          else
            SELECTED_COMPANY_SOURCE="SMARTUP secrets"
            SELECTED_COMPANY_CODE="$SMARTUP_COMPANY_CODE"
            SELECTED_COMPANY_PASSWORD="$SMARTUP_COMPANY_PASSWORD"
          fi
          echo "TEST_COMPANY_SOURCE=$SELECTED_COMPANY_SOURCE" >> "$GITHUB_ENV"
          echo "TEST_COMPANY_CODE=$SELECTED_COMPANY_CODE" >> "$GITHUB_ENV"
          echo "TEST_COMPANY_PASSWORD=$SELECTED_COMPANY_PASSWORD" >> "$GITHUB_ENV"
          [ -n "$SMARTUP_COMPANY_CODE" ] && echo "::add-mask::$SMARTUP_COMPANY_CODE"
          [ -n "$SMARTUP_COMPANY_PASSWORD" ] && echo "::add-mask::$SMARTUP_COMPANY_PASSWORD"
          [ -n "$APP3_COMPANY_CODE" ] && echo "::add-mask::$APP3_COMPANY_CODE"
          [ -n "$APP3_COMPANY_PASSWORD" ] && echo "::add-mask::$APP3_COMPANY_PASSWORD"
          [ -n "$SELECTED_COMPANY_CODE" ] && echo "::add-mask::$SELECTED_COMPANY_CODE"
          [ -n "$SELECTED_COMPANY_PASSWORD" ] && echo "::add-mask::$SELECTED_COMPANY_PASSWORD"

      - name: Run daily smoke tests
        run: |
          mkdir -p test-results
          set -o pipefail
          python scripts/run_tests.py "$TEST_TARGET" \
            --url "$TEST_SERVER_URL" \
            --company-code "$TEST_COMPANY_CODE" \
            --company-password "$TEST_COMPANY_PASSWORD" \
            --scope "$TEST_SCOPE" \
            --headless 2>&1 | tee test-results/ci-test-output.log

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: daily-smoke-test-results
          path: test-results/
          retention-days: 7

      - name: Send Telegram notification
        if: ${{ always() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured; skipping notification."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_TEXT="[PASSED]"
          else
            STATUS_TEXT="[FAILED]"
          fi

          SUMMARY=$(grep -E "={2,} .* (passed|failed|errors?|skipped|xfailed|xpassed).* in .* ={2,}" \
            test-results/ci-test-output.log 2>/dev/null | tail -1 | sed -E 's/^=+ //; s/ =+$//' || true)
          if [ -z "$SUMMARY" ]; then
            SUMMARY="Pytest summary not found. Open the run link for logs."
          fi

          RUN_CODE=$(python - <<'PY' || true
          import json
          from pathlib import Path

          path = Path("test-results/data/data_store.json")
          if path.exists():
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  data = {}
              code = data.get("code") if isinstance(data, dict) else None
              if code not in (None, ""):
                  print(str(code))
          PY
          )
          COMPANY_SUFFIX="${TEST_COMPANY_CODE#@}"
          if [ -n "$RUN_CODE" ] && [ -n "$COMPANY_SUFFIX" ]; then
            USER_LOGIN="user-pw${RUN_CODE}@${COMPANY_SUFFIX}"
          else
            USER_LOGIN="not found"
          fi

          FAILED_TESTS=$(grep -E "^(FAILED|ERROR) " test-results/ci-test-output.log 2>/dev/null \
            | head -5 | sed 's/^/- /' || true)
          FAILED_TEST=$(printf '%s' "$FAILED_TESTS" | head -1 | sed -E 's/^- (FAILED|ERROR) //; s/ - .*$//' || true)
          ERROR_LINE=$(printf '%s' "$FAILED_TESTS" | head -1 | sed -E 's/^- (FAILED|ERROR) [^ ]+ - //' || true)

          COMMIT_SHORT=$(printf '%s' "$GITHUB_SHA" | cut -c1-7)
          MESSAGE=$(printf 'Daily Smoke Tests %s\n\nServer: %s\nScope: %s\nTarget: %s\nCompany: %s\nUser login: %s\nSummary: %s\n\nRun: %s' \
            "$STATUS_TEXT" "$TEST_SERVER_URL" "$TEST_SCOPE" "$TEST_TARGET" "$TEST_COMPANY_SOURCE" "$USER_LOGIN" "$SUMMARY" "$RUN_URL")

          if [ -n "$FAILED_TEST" ]; then
            MESSAGE=$(printf '%s\n\nFailed test:\n%s' "$MESSAGE" "$FAILED_TEST")
          fi
          if [ -n "$ERROR_LINE" ]; then
            MESSAGE=$(printf '%s\n\nError:\n%s' "$MESSAGE" "$ERROR_LINE")
          fi
          MESSAGE=$(printf '%s\n\nArtifacts:\nOpen run link -> daily-smoke-test-results' "$MESSAGE")

          curl --fail-with-body -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "disable_web_page_preview=true" \
            || echo "Telegram notification failed."

          if [ "$JOB_STATUS" != "success" ]; then
            SCREENSHOT=$(find test-results -type f -name "*.png" 2>/dev/null | sort | tail -1 || true)
            if [ -n "$SCREENSHOT" ]; then
              curl --fail-with-body -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
                -F "chat_id=${TELEGRAM_CHAT_ID}" \
                -F "caption=Failed screenshot" \
                -F "photo=@${SCREENSHOT}" \
                || echo "Telegram screenshot upload failed."
            else
              curl --fail-with-body -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=Failed screenshot topilmadi. Trace/log artifact ichida bo'lishi mumkin." \
                --data-urlencode "disable_web_page_preview=true" \
                || echo "Telegram screenshot-missing notification failed."
            fi
          fi
