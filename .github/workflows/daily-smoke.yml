name: Daily Regression Tests

on:
  schedule:
    # 00:00, 06:00, 12:00, 18:00 Toshkent vaqti (UTC+5)
    - cron: "0 19,1,7,13 * * *"
  workflow_dispatch:
    inputs:
      server_url:
        description: Server URL
        required: true
        default: https://app3.greenwhite.uz/xtrade
        type: string

concurrency:
  group: daily-regression-tests
  cancel-in-progress: false

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TEST_SERVER_URL: ${{ github.event.inputs.server_url || 'https://app3.greenwhite.uz/xtrade' }}
      APP3_COMPANY_CODE: ${{ secrets.APP3_COMPANY_CODE }}
      APP3_COMPANY_PASSWORD: ${{ secrets.APP3_COMPANY_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Mask company credentials
        run: |
          NORMALIZED_TEST_SERVER_URL="${TEST_SERVER_URL%/}"
          echo "TEST_SERVER_URL=$NORMALIZED_TEST_SERVER_URL" >> "$GITHUB_ENV"
          [ -n "$APP3_COMPANY_CODE" ] && echo "::add-mask::$APP3_COMPANY_CODE"
          [ -n "$APP3_COMPANY_PASSWORD" ] && echo "::add-mask::$APP3_COMPANY_PASSWORD"

      - name: Run regression tests
        run: |
          mkdir -p test-results
          set -o pipefail
          python -m pytest tests/regression/ \
            --url "$TEST_SERVER_URL" \
            --company-code "$APP3_COMPANY_CODE" \
            --company-password "$APP3_COMPANY_PASSWORD" \
            --headless \
            -s 2>&1 | tee test-results/ci-test-output.log

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: daily-regression-test-results
          path: test-results/
          retention-days: 7
